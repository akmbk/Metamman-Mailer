<!DOCTYPE html>
<html lang="en">
<head>
    <title>Direct Signal Transmitter</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #050505; color: #39ff14; padding: 20px; }
        .panel { border: 1px solid #39ff14; padding: 20px; width: 420px; box-shadow: 0 0 10px #39ff14; }
        input, textarea { background: #000; color: #39ff14; border: 1px solid #333; width: 95%; margin-bottom: 12px; padding: 8px; outline: none; }
        input:focus { border-color: #39ff14; }
        button { background: #39ff14; color: #000; border: none; padding: 12px; width: 100%; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #000; color: #39ff14; border: 1px solid #39ff14; }
        #status { margin-top: 15px; font-size: 0.85em; color: #00bfff; }
    </style>
</head>
<body>
    <div class="panel">
        <h3>// DIRECT_MAIL_PULSE_v2</h3>
        <input type="email" id="to" placeholder="Target Receiver (To)">
        <input type="text" id="subject" placeholder="Email Subject">
        <textarea id="message" rows="5" placeholder="Enter Message Data..."></textarea>
        <button onclick="fireSignal()">FIRE DIRECT PULSE</button>
        <div id="status">Status: Circuit Idle...</div>
    </div>

    <script>
        async function fireSignal() {
            const status = document.getElementById('status');
            const dataPacket = {
                to: document.getElementById('to').value,
                subject: document.getElementById('subject').value,
                message: document.getElementById('message').value
            };

            status.innerText = "Status: Injecting Signal into Bus...";

            try {
                // REPLACE THIS URL with your actual Serverless Endpoint!
                const response = await fetch('YOUR_SERVERLESS_URL', {
                    method: 'POST',
                    mode: 'cors', // Ensure CORS is active
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dataPacket)
                });

                const result = await response.json();
                
                if (response.ok) {
                    status.style.color = "#39ff14";
                    status.innerText = "Status: SUCCESS! Signal Dispatched. ✅";
                } else {
                    status.style.color = "#ff4500";
                    status.innerText = "Status: BUS ERROR - " + (result.error || "Response Failure");
                }
            } catch (err) {
                status.style.color = "#ff0000";
                status.innerText = "Status: CRITICAL - Network Short-Circuit (Check CORS/URL)";
                console.error("Trace Log:", err);
            }
        }
    </script>
</body>
</html>
